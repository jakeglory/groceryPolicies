name: Platform Policy Exemption Cleanup - $(Build.SourceBranchName) - $(date:yyyyMMdd)

trigger: none

schedules:
  - cron: "0 2 * * *"
    displayName: "Daily 02:00 UTC"
    branches:
      include:
        - main
    always: true

parameters:
  - name: buildScope
    displayName: 'Build cleanup scope'
    type: string
    default: '/providers/Microsoft.Management/managementGroups/build-mg-aldi'
  - name: buildServiceConnection
    displayName: 'Build Azure Service Connection'
    type: string
    default: 'serviceconnection-AN-Azure-ControlRepo-build-mg-aldi'
  - name: devScope
    displayName: 'Dev cleanup scope'
    type: string
    default: '/providers/Microsoft.Management/managementGroups/dev-mg-ALDI'
  - name: devServiceConnection
    displayName: 'Dev Azure Service Connection'
    type: string
    default: 'serviceconnection-AN-Azure-ControlRepo-dev-mg-aldi'
  - name: prodScope
    displayName: 'Prod cleanup scope'
    type: string
    default: '/providers/Microsoft.Management/managementGroups/mg-ALDI'
  - name: prodServiceConnection
    displayName: 'Prod Azure Service Connection'
    type: string
    default: 'serviceconnection-AN-Azure-ControlRepo-prod-mg-aldi'
  - name: retentionDaysAfterExpiry
    displayName: 'Days after expiry before deletion'
    type: number
    default: 30
  - name: dryRun
    displayName: 'Dry run only'
    type: boolean
    default: false

variables:
  vmImage: ""
  agentPoolName: "vmss-agents-prd-mgmt-win-002"

stages:
  - stage: PolicyExemptionCleanup
    displayName: 'Policy Exemption Cleanup'
    jobs:
      - job: RunPolicyExemptionCleanup
        displayName: 'Dry run and cleanup expired policy exemptions'
        pool:
          ${{ if ne(variables.vmImage, '') }}:
            vmImage: $(vmImage)
          ${{ if ne(variables.agentPoolName, '') }}:
            name: $(agentPoolName)
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: 'Dry run build policy exemption cleanup'
            inputs:
              azureSubscription: '${{ parameters.buildServiceConnection }}'
              scriptType: 'pscore'
              visibleAzLogin: false
              scriptLocation: 'inlineScript'
              inlineScript: |
                $PSVersionTable.PSVersion
                & "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/scripts/Remove-ExpiredPolicyExemptions.ps1" `
                  -Scope "${{ parameters.buildScope }}" `
                  -EnvironmentName "Build" `
                  -RetentionDaysAfterExpiry ${{ parameters.retentionDaysAfterExpiry }} `
                  -DryRun:$true `
                  -SummaryOutputPath "$(Build.ArtifactStagingDirectory)/summaries/build-dryrun-summary.json"

          - task: AzureCLI@2
            displayName: 'Dry run dev policy exemption cleanup'
            inputs:
              azureSubscription: '${{ parameters.devServiceConnection }}'
              scriptType: 'pscore'
              visibleAzLogin: false
              scriptLocation: 'inlineScript'
              inlineScript: |
                $PSVersionTable.PSVersion
                & "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/scripts/Remove-ExpiredPolicyExemptions.ps1" `
                  -Scope "${{ parameters.devScope }}" `
                  -EnvironmentName "Dev" `
                  -RetentionDaysAfterExpiry ${{ parameters.retentionDaysAfterExpiry }} `
                  -DryRun:$true `
                  -SummaryOutputPath "$(Build.ArtifactStagingDirectory)/summaries/dev-dryrun-summary.json"

          - task: AzureCLI@2
            displayName: 'Dry run prod policy exemption cleanup'
            inputs:
              azureSubscription: '${{ parameters.prodServiceConnection }}'
              scriptType: 'pscore'
              visibleAzLogin: false
              scriptLocation: 'inlineScript'
              inlineScript: |
                $PSVersionTable.PSVersion
                & "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/scripts/Remove-ExpiredPolicyExemptions.ps1" `
                  -Scope "${{ parameters.prodScope }}" `
                  -EnvironmentName "Prod" `
                  -RetentionDaysAfterExpiry ${{ parameters.retentionDaysAfterExpiry }} `
                  -DryRun:$true `
                  -SummaryOutputPath "$(Build.ArtifactStagingDirectory)/summaries/prod-dryrun-summary.json"

          - task: AzureCLI@2
            displayName: 'Cleanup expired build policy exemptions'
            condition: and(succeeded(), ${{ ne(parameters.dryRun, true) }})
            inputs:
              azureSubscription: '${{ parameters.buildServiceConnection }}'
              scriptType: 'pscore'
              visibleAzLogin: false
              scriptLocation: 'inlineScript'
              inlineScript: |
                $PSVersionTable.PSVersion
                & "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/scripts/Remove-ExpiredPolicyExemptions.ps1" `
                  -Scope "${{ parameters.buildScope }}" `
                  -EnvironmentName "Build" `
                  -RetentionDaysAfterExpiry ${{ parameters.retentionDaysAfterExpiry }} `
                  -DryRun:$false `
                  -SummaryOutputPath "$(Build.ArtifactStagingDirectory)/summaries/build-cleanup-summary.json"

          - task: AzureCLI@2
            displayName: 'Cleanup expired dev policy exemptions'
            condition: and(succeeded(), ${{ ne(parameters.dryRun, true) }})
            inputs:
              azureSubscription: '${{ parameters.devServiceConnection }}'
              scriptType: 'pscore'
              visibleAzLogin: false
              scriptLocation: 'inlineScript'
              inlineScript: |
                $PSVersionTable.PSVersion
                & "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/scripts/Remove-ExpiredPolicyExemptions.ps1" `
                  -Scope "${{ parameters.devScope }}" `
                  -EnvironmentName "Dev" `
                  -RetentionDaysAfterExpiry ${{ parameters.retentionDaysAfterExpiry }} `
                  -DryRun:$false `
                  -SummaryOutputPath "$(Build.ArtifactStagingDirectory)/summaries/dev-cleanup-summary.json"

          - task: AzureCLI@2
            displayName: 'Cleanup expired prod policy exemptions'
            condition: and(succeeded(), ${{ ne(parameters.dryRun, true) }})
            inputs:
              azureSubscription: '${{ parameters.prodServiceConnection }}'
              scriptType: 'pscore'
              visibleAzLogin: false
              scriptLocation: 'inlineScript'
              inlineScript: |
                $PSVersionTable.PSVersion
                & "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/scripts/Remove-ExpiredPolicyExemptions.ps1" `
                  -Scope "${{ parameters.prodScope }}" `
                  -EnvironmentName "Prod" `
                  -RetentionDaysAfterExpiry ${{ parameters.retentionDaysAfterExpiry }} `
                  -DryRun:$false `
                  -SummaryOutputPath "$(Build.ArtifactStagingDirectory)/summaries/prod-cleanup-summary.json"

          - task: PowerShell@2
            displayName: 'Combine cleanup summaries'
            condition: always()
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                $summaryDirectory = "$(Build.ArtifactStagingDirectory)/summaries"
                $combinedSummaryPath = Join-Path $summaryDirectory 'policy-exemption-cleanup-summary.json'
                New-Item -ItemType Directory -Path $summaryDirectory -Force | Out-Null

                $summaryFiles = Get-ChildItem -Path $summaryDirectory -Filter '*-summary.json' -File -ErrorAction SilentlyContinue | Sort-Object Name
                $entries = @()

                foreach ($summaryFile in $summaryFiles) {
                  try {
                    $entries += Get-Content -Path $summaryFile.FullName -Raw | ConvertFrom-Json
                  }
                  catch {
                    $entries += [PSCustomObject]@{
                      generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
                      status = 'Failed'
                      message = "Failed to parse summary file '$($summaryFile.Name)': $($_.Exception.Message)"
                      sourceFile = $summaryFile.Name
                    }
                  }
                }

                $expectedFiles = @(
                  'build-dryrun-summary.json',
                  'dev-dryrun-summary.json',
                  'prod-dryrun-summary.json'
                )

                if ('${{ parameters.dryRun }}' -ne 'true') {
                  $expectedFiles += @(
                    'build-cleanup-summary.json',
                    'dev-cleanup-summary.json',
                    'prod-cleanup-summary.json'
                  )
                }

                $foundFileNames = @($summaryFiles | ForEach-Object { $_.Name })
                $missingFiles = @($expectedFiles | Where-Object { $_ -notin $foundFileNames })

                $combinedSummary = [ordered]@{
                  generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
                  pipelineName = 'Platform Policy Exemption Cleanup'
                  runId = '$(Build.BuildId)'
                  dryRunOnly = '${{ parameters.dryRun }}' -eq 'true'
                  retentionDaysAfterExpiry = ${{ parameters.retentionDaysAfterExpiry }}
                  summaryFilesFound = $foundFileNames
                  summaryFilesMissing = $missingFiles
                  summaries = $entries
                }

                $combinedSummary | ConvertTo-Json -Depth 20 | Set-Content -Path $combinedSummaryPath -Encoding UTF8
                Write-Host "Combined summary written to $combinedSummaryPath"

          - task: PublishPipelineArtifact@1
            displayName: 'Publish combined cleanup summary'
            condition: always()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/summaries/policy-exemption-cleanup-summary.json'
              artifact: 'policy-exemption-cleanup-summary'
              publishLocation: 'pipeline'
