  - stage: Build
    dependsOn: Approval
    jobs:
      - job: ExemptionsDeploymentBuild
        pool:
          ${{ if ne(variables.vmImage, '') }}:
            vmImage: $(vmImage)
          ${{ if ne(variables.agentPoolName, '') }}:
            name: $(agentPoolName)
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(BuildServiceConnection)
              scriptType: "ps"
              visibleAzLogin: false
              scriptLocation: "inlineScript"
              inlineScript: |
                $ErrorActionPreference = "Stop"
                $files = Get-ChildItem -Path "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/build" -Filter *.json
                if ($files.Count -eq 0) {
                  Write-Host "No policy exemption files found in build directory."
                  exit 0
                }

                $failed = @()
                $skippedExpiresOn = @()
                $expiresOnFuturePattern = "InvalidPolicyExemptionExpiration|ExpiresOn.*future"

                foreach ($file in $files) {
                  $exemptionName = ""
                  $scope = ""

                  try {
                    $jsonContent = Get-Content -Path $file.FullName -Raw | ConvertFrom-Json
                    $exemptionName = $jsonContent.name
                    $policyAssignmentId = $jsonContent.properties.policyAssignmentId
                    $exemptionCategory = $jsonContent.properties.exemptionCategory
                    $scope = $jsonContent.scope.subscriptionId
                    $expiresOn = $jsonContent.properties.expiresOn
                    $description = $jsonContent.properties.description
                    $policyDefinitionReferenceIds = @($jsonContent.properties.policyDefinitionReferenceIds)

                    if ([string]::IsNullOrWhiteSpace($exemptionName)) { throw "Missing required field: name" }
                    if ([string]::IsNullOrWhiteSpace($scope)) { throw "Missing required field: scope.subscriptionId" }
                    if ([string]::IsNullOrWhiteSpace($policyAssignmentId)) { throw "Missing required field: properties.policyAssignmentId" }
                    if ([string]::IsNullOrWhiteSpace($exemptionCategory)) { throw "Missing required field: properties.exemptionCategory" }
                    if ([string]::IsNullOrWhiteSpace($expiresOn)) { throw "Missing required field: properties.expiresOn" }
                    if ($policyDefinitionReferenceIds.Count -eq 0) { throw "Missing required field: properties.policyDefinitionReferenceIds" }

                    Write-Host "Deploying exemption. File=$($file.Name); Name=$exemptionName; Scope=$scope"

                    $azOutput = az policy exemption create --name $exemptionName `
                      --scope $scope `
                      --policy-assignment $policyAssignmentId `
                      --exemption-category $exemptionCategory `
                      --expires-on $expiresOn `
                      --description $description `
                      --policy-definition-reference-ids $policyDefinitionReferenceIds `
                      --only-show-errors 2>&1 | Out-String

                    if ($LASTEXITCODE -ne 0) {
                      throw "Azure CLI failed with exit code $LASTEXITCODE. Details: $azOutput"
                    }

                    Write-Host "SUCCESS | File=$($file.Name) | Exemption=$exemptionName"
                  }
                  catch {
                    $reason = $_.Exception.Message
                    if ($reason -match $expiresOnFuturePattern) {
                      Write-Host "WARNING | File=$($file.Name) | Exemption=$exemptionName | Scope=$scope | Action=Skipped | Reason=$reason"
                      $skippedExpiresOn += [PSCustomObject]@{
                        File = $file.Name
                        Exemption = $exemptionName
                        Scope = $scope
                        Reason = $reason
                      }
                      continue
                    }

                    Write-Host "ERROR | File=$($file.Name) | Exemption=$exemptionName | Scope=$scope | Reason=$reason"
                    $failed += [PSCustomObject]@{
                      File = $file.Name
                      Exemption = $exemptionName
                      Scope = $scope
                      Reason = $reason
                    }
                  }
                }

                if ($skippedExpiresOn.Count -gt 0) {
                  Write-Host "Policy exemption deployment skipped $($skippedExpiresOn.Count) file(s) due to non-future ExpiresOn."
                  foreach ($warning in $skippedExpiresOn) {
                    Write-Host "SKIPPED | File=$($warning.File) | Exemption=$($warning.Exemption) | Scope=$($warning.Scope) | Reason=$($warning.Reason)"
                  }
                }

                if ($failed.Count -gt 0) {
                  Write-Host "Policy exemption deployment completed with $($failed.Count) failure(s)."
                  foreach ($failure in $failed) {
                    Write-Host "FAILED | File=$($failure.File) | Exemption=$($failure.Exemption) | Scope=$($failure.Scope) | Reason=$($failure.Reason)"
                  }
                  throw "One or more policy exemptions failed in build stage."
                }

                if ($skippedExpiresOn.Count -gt 0) {
                  Write-Host "Policy exemption deployment completed with warnings in build stage."
                }
                else {
                  Write-Host "Policy exemption deployment completed successfully for all files in build stage."
                }

  - stage: Approval
    dependsOn: WhatIf
    jobs:
      - job: ManualApproval
        displayName: Manual approval before deployments
        pool: server
        timeoutInMinutes: 4320
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: $(ManualApprovalNotifyUsers)
              instructions: |
                Review the WhatIf output for policy exemptions.
                Approve this step to continue with Build, Dev, and Prod exemption deployments.
              onTimeout: reject

