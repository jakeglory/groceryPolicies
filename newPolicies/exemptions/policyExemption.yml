                  catch {
                    $reason = $_.Exception.Message
                    if ($reason -match $expiresOnFuturePattern) {
                      Write-Host "WARNING | File=$($file.Name) | Exemption=$exemptionName | Scope=$scope | Action=Skipped | Reason=$reason"
                      $skippedExpiresOn += [PSCustomObject]@{
