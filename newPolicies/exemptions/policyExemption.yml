name: Platform Policy Exemptions - $(Build.SourceBranchName) - $(Build.RequestedFor) - $(date:yyyyMMdd)

trigger:
  - none

variables:
  BuildServiceConnection: "serviceconnection-AN-Azure-ControlRepo-build-mg-aldi"
  DevServiceConnection: "serviceconnection-AN-Azure-ControlRepo-dev-mg-aldi"
  ProdServiceConnection: "serviceconnection-AN-Azure-ControlRepo-prod-mg-aldi"
  ManualApprovalNotifyUsers: ""
  vmImage: ""
  agentPoolName: "vmss-agents-prd-mgmt-win-002"

stages:
  - stage: WhatIf
    jobs:
      - job: WhatIfBuildEnvironmnet
        pool:
          ${{ if ne(variables.vmImage, '') }}:
            vmImage: $(vmImage)
          ${{ if ne(variables.agentPoolName, '') }}:
            name: $(agentPoolName)
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(BuildServiceConnection)
              scriptType: "ps"
              visibleAzLogin: false
              scriptLocation: "inlineScript"
              inlineScript: |
                $ErrorActionPreference = "Stop"
                $files = Get-ChildItem -Path "$(System.DefaultWorkingDirectory)/newPolicies/exemptions/build" -Filter *.json
                if ($files.Count -eq 0) {
                  Write-Host "No files found in the build directory."
                  exit 0
                }

                $invalid = @()

                foreach ($file in $files) {
                  $exemptionName = ""
                  $scope = ""

                  try {
                    $jsonContent = Get-Content -Path $file.FullName -Raw | ConvertFrom-Json
                    $exemptionName = $jsonContent.name
                    $policyAssignmentId = $jsonContent.properties.policyAssignmentId
                    $exemptionCategory = $jsonContent.properties.exemptionCategory
                    $scope = $jsonContent.scope.subscriptionId
                    $expiresOn = $jsonContent.properties.expiresOn
                    $policyDefinitionReferenceIds = @($jsonContent.properties.policyDefinitionReferenceIds)

                    if ([string]::IsNullOrWhiteSpace($exemptionName)) { throw "Missing required field: name" }
                    if ([string]::IsNullOrWhiteSpace($scope)) { throw "Missing required field: scope.subscriptionId" }
                    if ([string]::IsNullOrWhiteSpace($policyAssignmentId)) { throw "Missing required field: properties.policyAssignmentId" }
                    if ([string]::IsNullOrWhiteSpace($exemptionCategory)) { throw "Missing required field: properties.exemptionCategory" }
                    if ([string]::IsNullOrWhiteSpace($expiresOn)) { throw "Missing required field: properties.expiresOn" }
                    if ($policyDefinitionReferenceIds.Count -eq 0) { throw "Missing required field: properties.policyDefinitionReferenceIds" }

                    $parsedExpiresOn = [DateTimeOffset]::MinValue
                    if (-not [DateTimeOffset]::TryParse($expiresOn, [ref]$parsedExpiresOn)) {
                      throw "Invalid properties.expiresOn format: '$expiresOn'"
                    }
                    if ($parsedExpiresOn -le [DateTimeOffset]::UtcNow) {
                      throw "Invalid properties.expiresOn: '$expiresOn' is not a future date/time"
                    }

                    Write-Host "WHATIF OK | File=$($file.Name) | Name=$exemptionName | Scope=$scope | PolicyAssignmentId=$policyAssignmentId | ExpiresOn=$expiresOn"
                  }
                  catch {
                    $reason = $_.Exception.Message
                    Write-Host "WHATIF ERROR | File=$($file.Name) | Name=$exemptionName | Scope=$scope | Reason=$reason"
                    $invalid += [PSCustomObject]@{
                      File = $file.Name
                      Exemption = $exemptionName
                      Scope = $scope
                      Reason = $reason
                    }
                  }
                }

                if ($invalid.Count -gt 0) {
                  Write-Host "WhatIf build validation found $($invalid.Count) invalid file(s)."
                  foreach ($issue in $invalid) {
                    Write-Host "INVALID | File=$($issue.File) | Exemption=$($issue.Exemption) | Scope=$($issue.Scope) | Reason=$($issue.Reason)"
                  }
                  throw "WhatIf build validation failed."
                }

                Write-Host "WhatIf build validation passed for all files."
