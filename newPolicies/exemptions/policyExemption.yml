                  foreach ($failure in $failed) {
                    Write-Host "FAILED | File=$($failure.File) | Exemption=$($failure.Exemption) | Scope=$($failure.Scope) | Reason=$($failure.Reason)"
                  }
                  throw "One or more policy exemptions failed in dev stage."
